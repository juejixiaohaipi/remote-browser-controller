<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  h1 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .status-bar { padding: 8px 12px; border-radius: 6px; margin-bottom: 14px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .status-bar.connecting { background: #2a2a4a; color: #a0a0c0; }
  .status-bar.connected { background: #1a3a2a; color: #4ade80; }
  .status-bar.disconnected { background: #3a1a1a; color: #f87171; }
  .status-bar.error { background: #3a2a1a; color: #fb923c; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .connecting .dot { background: #a0a0c0; }
  .connected .dot { background: #4ade80; }
  .disconnected .dot { background: #f87171; }
  .error .dot { background: #fb923c; }
  .hint { font-size: 11px; color: #888; margin-bottom: 14px; line-height: 1.5; background: #16162a; padding: 8px 10px; border-radius: 6px; }
  .hint code { color: #93c5fd; font-family: monospace; }
  label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #333; border-radius: 6px; background: #16162a; color: #e0e0e0; font-size: 13px; margin-bottom: 10px; outline: none; }
  input:focus { border-color: #4f46e5; }
  input[type="number"] { width: 120px; }
  .row { display: flex; gap: 8px; }
  .row label { display: block; flex: 1; }
  .row input { flex: 1; }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }
  .btn-connect { background: #4f46e5; color: #fff; }
  .btn-disconnect { background: #3a3a5a; color: #c0c0d0; }
  .btn-save { background: #2a2a4a; color: #a0a0c0; font-size: 12px; padding: 6px; }
  .footer { margin-top: 12px; font-size: 11px; color: #555; text-align: center; }
</style>
</head>
<body>

<h1>🔗 RBC Relay</h1>

<div id="status-bar" class="status-bar disconnected">
  <span class="dot"></span>
  <span id="status-text">未连接</span>
</div>

<div class="hint">
  需要先运行 <code>relay.exe</code>（或在 Windows 上 <code>node relay.js</code>），然后填入对应的 Relay Token。
</div>

<label>Relay Token</label>
<input id="token" type="password" placeholder="relay 连接令牌">

<div class="row">
  <div>
    <label>Relay Port</label>
    <input id="port" type="number" value="18792" min="1" max="65535">
  </div>
  <div style="flex:2">
    <label>设备名称</label>
    <input id="name" type="text" placeholder="RBC-Relay">
  </div>
</div>

<div class="btn-row">
  <button class="btn-connect" id="btn-connect">连接</button>
  <button class="btn-disconnect" id="btn-disconnect">断开</button>
</div>

<div class="btn-row">
  <button class="btn-save" id="btn-save">保存设置</button>
</div>

<div class="footer">RBC Relay — 通过本地 Relay 连接远程 BAP</div>

<script src="popup.js"></script>
</body>
</html>
